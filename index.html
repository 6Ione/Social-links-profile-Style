<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/fonts/inter.css">
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    .body {
      font-family: 'Inter', sans-serif;
      background-color: hsl(0, 0%, 8%)
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      align-items: center;
      display: flex;
      flex-direction: column;
      text-align: center;
      background-color: hsl(0, 0%, 12%);
      border-radius: 15px;
      max-width: 350px;
      padding: 20px 90px;
      
    }

    .card-image img {
      display: block;
      margin: auto;
      width: 50%;
      border-radius: 50%;
    }

    .card-name {
      color: white;
    }

    .card-name h1 {
      display: flex;
      text-align: center;
      font-size: 1.5rem;
      justify-content: center;
      align-items: center;
    }

    .card-name p {
      color: hsl(75, 94%, 57%);
      display: flex;
      text-align: center;
      justify-content: center;
      align-items: center;
      font-size: 0.9rem;
    }

    .card-name span {
      display: flex;
      text-align: center;
      font-size: 0.9rem;
      justify-content: center;
      align-items: center;
      margin-top: 35px;
      margin-bottom: 20px;
    }

    .card-btns {
      width: 130%;    /* ADD THIS */
    }
    
    .main-btn {
      display: block;
      border-radius: 10px;
      margin-bottom: 15px;
      padding: 15px 0px;
      font-weight: bold;
      background-color: hsl(0, 0%, 20%);
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body class="body">
  <main>
    <div class="container">
      <div class="card">
        <div class="card-image">
          <img src="./assets/images/avatar-jessica.jpeg" alt="jessica">
        </div>

        <div class="card-name">
          <h1>Jessica Randall</h1>
          <p>London, United Kingdom</p>

          <span>"Front-end developer and avid reader."</span>
        </div>

        <div class="card-btns">
          <a href="" class="main-btn">Github</a>
          <a href="" class="main-btn">Frontend Mentor</a>
          <a href="" class="main-btn">LinkedIn</a>
          <a href="" class="main-btn">Twitter</a>
          <a href="" class="main-btn">Instagram</a>
        </div>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Capo</a>.
  </footer>
</body>
</html>
